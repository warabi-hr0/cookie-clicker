<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>クッキー貯蔵量 最適化計算機</title>

  <style>
    :root {
      --bg: #17130f;
      --card: #241c15;
      --card2: #30251b;
      --text: #fff4df;
      --muted: #c9b79b;
      --accent: #f2b84b;
      --accent2: #8ee08e;
      --border: #4a3726;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #332315 0%, var(--bg) 52%, #0f0b08 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .app { max-width: 980px; margin: 0 auto; }

    header { margin-bottom: 20px; }

    h1 {
      font-size: clamp(1.7rem, 4vw, 2.7rem);
      margin: 0 0 8px;
    }

    .lead {
      color: var(--muted);
      line-height: 1.7;
      margin: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    @media (max-width: 760px) {
      body { padding: 14px; }
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: linear-gradient(180deg, var(--card), var(--card2));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 35px rgba(0,0,0,.28);
    }

    .card.full { grid-column: 1 / -1; }

    h2 {
      margin: 0 0 14px;
      font-size: 1.15rem;
      color: #ffe0a3;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: .92rem;
      margin-bottom: 7px;
    }

    .field { margin-bottom: 16px; }

    .input-row {
      display: grid;
      grid-template-columns: minmax(120px, 180px) 100px;
      gap: 8px;
      align-items: center;
    }

    input,
    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #604832;
      background: #130f0b;
      color: var(--text);
      font-size: 1.05rem;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(242,184,75,.16);
    }

    .results {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    @media (max-width: 760px) {
      .results { grid-template-columns: 1fr; }
    }

    .result-box {
      background: rgba(0,0,0,.23);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 15px;
      padding: 15px;
    }

    .result-title {
      color: var(--muted);
      font-size: .86rem;
      margin-bottom: 8px;
    }

    .result-value {
      font-size: clamp(1.25rem, 3vw, 1.8rem);
      font-weight: 800;
      color: var(--accent2);
      overflow-wrap: anywhere;
      line-height: 1.35;
    }

    .section-title { margin-top: 18px; }

    .footer-note {
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.7;
      margin-top: 16px;
    }
  </style>
</head>

<body>
  <main class="app">
    <header>
      <h1>🍪 クッキー貯蔵量 最適化計算機</h1>
      <p class="lead">
        「魔法でベーキング」と「ツイてる！」を最大効率で受け取るために必要な所持クッキー数を計算します。
      </p>
    </header>

    <section class="grid">
      <div class="card">
        <h2>入力</h2>

        <div class="field">
          <label for="normalCps">通常CpS</label>
          <div class="input-row">
            <input id="normalCps" type="number" inputmode="decimal" step="any" value="345" />
            <select id="normalUnit"></select>
          </div>
        </div>

        <div class="field">
          <label for="frenzyCps">7倍時CpS</label>
          <div class="input-row">
            <input id="frenzyCps" type="number" inputmode="decimal" step="any" value="2415" />
            <select id="frenzyUnit"></select>
          </div>
        </div>

        <div class="field">
          <label for="xMultiplier">X倍倍率</label>
          <div class="input-row">
            <input id="xMultiplier" type="number" inputmode="decimal" step="any" value="15" />
            <select disabled>
              <option>倍</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card full">
        <h2>魔法でベーキング 最適所持クッキー数</h2>

        <div class="results">
          <div class="result-box">
            <div class="result-title">通常CpS時</div>
            <div id="bakeNormal" class="result-value">-</div>
          </div>

          <div class="result-box">
            <div class="result-title">7倍時</div>
            <div id="bakeFrenzy" class="result-value">-</div>
          </div>

          <div class="result-box">
            <div class="result-title">X倍時</div>
            <div id="bakeX" class="result-value">-</div>
          </div>
        </div>

        <h2 class="section-title">ツイてる！ 最適所持クッキー数</h2>

        <div class="results">
          <div class="result-box">
            <div class="result-title">通常CpS時</div>
            <div id="luckyNormal" class="result-value">-</div>
          </div>

          <div class="result-box">
            <div class="result-title">7倍時</div>
            <div id="luckyFrenzy" class="result-value">-</div>
          </div>

          <div class="result-box">
            <div class="result-title">X倍時</div>
            <div id="luckyX" class="result-value">-</div>
          </div>
        </div>

        <p class="footer-note">
          「魔法でベーキング」はCpSの12,000秒ぶん。<br>
          「ツイてる！」はその半分なので、CpSの6,000秒ぶんが目安です。
        </p>
      </div>
    </section>
  </main>

  <script>
    const units = [
      { label: '無量大数', value: 1e68 },
      { label: '不可思議', value: 1e64 },
      { label: '那由他', value: 1e60 },
      { label: '阿僧祇', value: 1e56 },
      { label: '恒河沙', value: 1e52 },
      { label: '極', value: 1e48 },
      { label: '載', value: 1e44 },
      { label: '正', value: 1e40 },
      { label: '澗', value: 1e36 },
      { label: '溝', value: 1e32 },
      { label: '穣', value: 1e28 },
      { label: '秭', value: 1e24 },
      { label: '垓', value: 1e20 },
      { label: '京', value: 1e16 },
      { label: '兆', value: 1e12 },
      { label: '億', value: 1e8 },
      { label: '万', value: 1e4 },
      { label: 'なし', value: 1 },
    ];

    const normalInput = document.getElementById('normalCps');
    const frenzyInput = document.getElementById('frenzyCps');
    const normalUnit = document.getElementById('normalUnit');
    const frenzyUnit = document.getElementById('frenzyUnit');
    const xInput = document.getElementById('xMultiplier');

    const bakeNormal = document.getElementById('bakeNormal');
    const bakeFrenzy = document.getElementById('bakeFrenzy');
    const bakeX = document.getElementById('bakeX');

    const luckyNormal = document.getElementById('luckyNormal');
    const luckyFrenzy = document.getElementById('luckyFrenzy');
    const luckyX = document.getElementById('luckyX');

    let syncing = false;

    function setupUnitSelect(selectEl, defaultLabel) {
      selectEl.innerHTML = units.map(unit => `
        <option value="${unit.value}" ${unit.label === defaultLabel ? 'selected' : ''}>
          ${unit.label}
        </option>
      `).join('');
    }

    setupUnitSelect(normalUnit, '兆');
    setupUnitSelect(frenzyUnit, '兆');

    function getNumber(input, unitSelect) {
      const value = Number(input.value);
      const unit = Number(unitSelect.value);

      if (!Number.isFinite(value) || !Number.isFinite(unit)) {
        return NaN;
      }

      return value * unit;
    }

    function formatInputNumber(num) {
      if (!Number.isFinite(num)) return '';

      const abs = Math.abs(num);

      if (abs >= 10) {
        return String(Math.round(num));
      }

      if (abs >= 1) {
        return String(Math.round(num * 10) / 10);
      }

      return String(Math.round(num * 100) / 100);
    }

    function setNumberWithBestUnit(input, unitSelect, rawValue) {
      if (!Number.isFinite(rawValue)) return;

      let selected = units[units.length - 1];

      for (const unit of units) {
        if (Math.abs(rawValue) >= unit.value) {
          selected = unit;
          break;
        }
      }

      unitSelect.value = String(selected.value);
      input.value = formatInputNumber(rawValue / selected.value);
    }

    function formatJapaneseNumber(num) {
      if (!Number.isFinite(num)) return '-';
      if (num === 0) return '0';

      const abs = Math.abs(num);
      const sign = num < 0 ? '-' : '';

      if (abs < 10000) {
        return sign + Math.round(abs).toLocaleString('ja-JP');
      }

      for (const unit of units) {
        if (unit.value === 1) continue;

        if (abs >= unit.value) {
          const main = abs / unit.value;
          const digits = main >= 100 ? 0 : main >= 10 ? 1 : 2;
          const rounded = Number(main.toFixed(digits));

          return sign + rounded.toLocaleString('ja-JP', {
            maximumFractionDigits: digits
          }) + unit.label;
        }
      }

      return String(num);
    }

    function formatCookie(num) {
      if (!Number.isFinite(num)) return '-';
      return `${formatJapaneseNumber(num)} 枚`;
    }

    function bakingNeeded(cps) {
      return cps * 12000;
    }

    function luckyNeeded(cps) {
      return cps * 6000;
    }

    function updateFromNormal() {
      if (syncing) return;

      const normal = getNumber(normalInput, normalUnit);

      if (Number.isFinite(normal)) {
        syncing = true;
        setNumberWithBestUnit(frenzyInput, frenzyUnit, normal * 7);
        syncing = false;
      }

      calculate();
    }

    function updateFromFrenzy() {
      if (syncing) return;

      const frenzy = getNumber(frenzyInput, frenzyUnit);

      if (Number.isFinite(frenzy)) {
        syncing = true;
        setNumberWithBestUnit(normalInput, normalUnit, frenzy / 7);
        syncing = false;
      }

      calculate();
    }

    function calculate() {
      const normal = getNumber(normalInput, normalUnit);
      const x = Number(xInput.value);

      if (
        !Number.isFinite(normal) ||
        normal <= 0 ||
        !Number.isFinite(x) ||
        x <= 0
      ) {
        [
          bakeNormal,
          bakeFrenzy,
          bakeX,
          luckyNormal,
          luckyFrenzy,
          luckyX
        ].forEach(el => {
          el.textContent = '-';
        });

        return;
      }

      const cpsNormal = normal;
      const cpsFrenzy = normal * 7;
      const cpsX = normal * x;

      bakeNormal.textContent = formatCookie(bakingNeeded(cpsNormal));
      bakeFrenzy.textContent = formatCookie(bakingNeeded(cpsFrenzy));
      bakeX.textContent = formatCookie(bakingNeeded(cpsX));

      luckyNormal.textContent = formatCookie(luckyNeeded(cpsNormal));
      luckyFrenzy.textContent = formatCookie(luckyNeeded(cpsFrenzy));
      luckyX.textContent = formatCookie(luckyNeeded(cpsX));
    }

    normalInput.addEventListener('input', updateFromNormal);
    normalUnit.addEventListener('change', updateFromNormal);

    frenzyInput.addEventListener('input', updateFromFrenzy);
    frenzyUnit.addEventListener('change', updateFromFrenzy);

    xInput.addEventListener('input', calculate);

    updateFromNormal();
  </script>
</body>
</html>
